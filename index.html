<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐧 Penguin Sled Adventure</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --hud: rgba(255, 255, 255, 0.94);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d47a1;
      font-family: 'Nunito', 'Comic Sans MS', cursive;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .screen.off {
      display: none !important;
    }

    /* ════════ START SCREEN ════════ */
    #sStart {
      background: radial-gradient(ellipse at 50% 30%, #29b6f6 0%, #0288d1 45%, #01579b 100%);
      gap: clamp(10px, 2.5vh, 22px);
      overflow: hidden;
    }

    /* Snowflake bg */
    #snowBg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sf {
      position: absolute;
      color: rgba(255, 255, 255, 0.7);
      animation: sfFall linear infinite;
      user-select: none;
    }

    @keyframes sfFall {
      0% {
        transform: translateY(-60px) rotate(0deg);
        opacity: .8;
      }

      100% {
        transform: translateY(110vh) rotate(540deg);
        opacity: 0;
      }
    }

    /* Animated title letters */
    #titleWrap {
      position: relative;
      text-align: center;
    }

    #titleWrap h1 {
      font-size: clamp(2.2rem, 7vw, 4rem);
      color: #fff;
      text-shadow: 3px 5px 0 #01579b, 0 0 50px rgba(255, 255, 255, 0.3);
      font-weight: 900;
      line-height: 1.1;
      animation: titleDrop .7s cubic-bezier(.34, 1.56, .64, 1) both;
    }

    @keyframes titleDrop {
      from {
        transform: translateY(-80px) scale(.5);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    /* Penguin hero with bounce + spotlight */
    #heroWrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: heroEntry .6s cubic-bezier(.34, 1.56, .64, 1) .2s both;
    }

    @keyframes heroEntry {
      from {
        transform: scale(0) rotate(-20deg);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    #heroPeng {
      font-size: clamp(90px, 20vw, 148px);
      animation: heroBob 1.8s ease-in-out infinite alternate;
      filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.4));
    }

    @keyframes heroBob {
      from {
        transform: translateY(0) rotate(-3deg)
      }

      to {
        transform: translateY(-16px) rotate(3deg)
      }
    }

    .spotlight {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse, rgba(255, 255, 255, 0.18) 0%, transparent 65%);
      top: -50%;
      left: -50%;
      animation: spotRot 4s linear infinite;
    }

    @keyframes spotRot {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }

    .sub-rules {
      display: flex;
      gap: clamp(8px, 2vw, 16px);
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp .5s ease .5s both;
    }

    @keyframes fadeUp {
      from {
        transform: translateY(20px);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    .rule-pill {
      background: rgba(255, 255, 255, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 40px;
      padding: 10px 18px;
      font-size: clamp(.95rem, 3vw, 1.35rem);
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
      backdrop-filter: blur(6px);
    }

    #btnStart {
      background: #ffd600;
      color: #3e2723;
      border: none;
      border-radius: 60px;
      padding: clamp(15px, 2.8vh, 24px) clamp(44px, 10vw, 80px);
      font-family: inherit;
      font-weight: 900;
      font-size: clamp(1.4rem, 4.5vw, 2.1rem);
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 8px 0 #f57f17, 0 16px 32px rgba(0, 0, 0, 0.25);
      transition: transform .1s, box-shadow .1s;
      animation: btnPulse 1.6s ease-in-out infinite alternate, fadeUp .5s ease .7s both;
    }

    @keyframes btnPulse {
      from {
        box-shadow: 0 8px 0 #f57f17, 0 16px 32px rgba(0, 0, 0, .25)
      }

      to {
        box-shadow: 0 8px 0 #f57f17, 0 16px 48px rgba(255, 214, 0, .5)
      }
    }

    #btnStart:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #f57f17;
    }

    /* ════════ COUNTDOWN OVERLAY ════════ */
    #cdOverlay {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(1, 87, 155, 0.88);
      backdrop-filter: blur(8px);
    }

    #cdOverlay.off {
      display: none !important;
    }

    #cdNum {
      font-size: clamp(120px, 35vw, 260px);
      color: #ffd600;
      font-weight: 900;
      text-shadow: 6px 8px 0 #e65100, 0 0 80px rgba(255, 214, 0, .6);
      animation: cdPop .5s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes cdPop {
      from {
        transform: scale(3);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    #cdLabel {
      font-size: clamp(1.4rem, 5vw, 2.4rem);
      color: #fff;
      font-weight: 900;
      text-shadow: 2px 3px 0 rgba(0, 0, 0, .3);
      margin-top: 8px;
      animation: cdPop .5s cubic-bezier(.34, 1.56, .64, 1) .1s both;
    }

    /* ════════ GAME ════════ */
    #sGame {
      padding: 0;
    }

    #gameCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(8px, 1.8vh, 16px) clamp(10px, 3vw, 24px);
      background: var(--hud);
      backdrop-filter: blur(12px);
      border-bottom: 4px solid #b3e5fc;
      gap: 8px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      border-radius: 40px;
      padding: 8px 18px;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      font-weight: 900;
      white-space: nowrap;
    }

    .pill .v {
      font-size: 1.28em;
    }

    .p-gold {
      background: #fff9c4;
      border: 3px solid #ffd600;
      color: #e65100;
    }

    .p-time {
      background: #fce4ec;
      border: 3px solid #f48fb1;
      color: #880e4f;
    }

    .p-round {
      background: #e3f2fd;
      border: 3px solid #64b5f6;
      color: #0d47a1;
    }

    #steers {
      position: absolute;
      bottom: clamp(12px, 3.5vh, 32px);
      left: 0;
      right: 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      padding: 0 clamp(14px, 4vw, 36px);
      pointer-events: none;
    }

    .sbtn {
      pointer-events: all;
      width: clamp(76px, 19vw, 110px);
      height: clamp(76px, 19vw, 110px);
      background: rgba(255, 255, 255, 0.88);
      border: 4px solid rgba(255, 255, 255, 0.96);
      border-radius: 50%;
      font-size: clamp(2.2rem, 7vw, 3.2rem);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.22);
      transition: transform .08s, background .08s;
    }

    .sbtn:active {
      transform: scale(0.87);
      background: rgba(179, 229, 252, .97);
    }

    /* ════════ QUESTION ════════ */
    #sQuestion {
      background: linear-gradient(155deg, #1a237e 0%, #1565c0 50%, #1976d2 100%);
      padding: clamp(12px, 3vh, 28px) clamp(12px, 4vw, 32px);
      gap: clamp(8px, 2vh, 16px);
    }

    #qHead {
      font-size: clamp(1.1rem, 3.8vw, 1.7rem);
      color: #90caf9;
      font-weight: 700;
      text-align: center;
      letter-spacing: 1px;
    }

    #qImg {
      width: clamp(150px, 37vw, 215px);
      height: clamp(150px, 37vw, 215px);
      background: #fff;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(78px, 21vw, 124px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, .32);
      border: 5px solid rgba(255, 255, 255, .55);
      flex-shrink: 0;
      animation: popIn .38s cubic-bezier(.34, 1.56, .64, 1) both;
    }

    @keyframes popIn {
      from {
        transform: scale(.3) rotate(-12deg);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    #qText {
      font-size: clamp(1.35rem, 4.8vw, 2.3rem);
      color: #fff;
      text-align: center;
      font-weight: 900;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, .28);
      line-height: 1.25;
      max-width: min(580px, 92vw);
    }

    #qAnswers {
      display: flex;
      gap: clamp(8px, 2.5vw, 16px);
      width: 100%;
      max-width: min(640px, 94vw);
    }

    .abtn {
      flex: 1;
      min-width: 0;
      background: #fff;
      border: 4px solid #90caf9;
      border-radius: 20px;
      padding: clamp(14px, 2.8vh, 24px) 8px;
      font-family: inherit;
      font-size: clamp(1rem, 3.8vw, 1.5rem);
      font-weight: 900;
      color: #1a237e;
      cursor: pointer;
      text-align: center;
      line-height: 1.2;
      transition: transform .12s, background .12s;
    }

    .abtn:active:not(:disabled) {
      transform: scale(0.93);
    }

    .abtn.ok {
      background: #c8e6c9 !important;
      border-color: #388e3c !important;
      color: #1b5e20 !important;
      animation: cPulse .4s ease;
    }

    .abtn.no {
      background: #ffcdd2 !important;
      border-color: #c62828 !important;
      color: #b71c1c !important;
    }

    @keyframes cPulse {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.08)
      }

      100% {
        transform: scale(1)
      }
    }

    #qFeed {
      font-size: clamp(1.7rem, 6.5vw, 2.8rem);
      min-height: 3.2rem;
      text-align: center;
      font-weight: 900;
    }

    #qBonus {
      font-size: clamp(1rem, 3.5vw, 1.5rem);
      color: #bbdefb;
      font-weight: 700;
      text-align: center;
      min-height: 1.8rem;
    }

    /* ════════ END ════════ */
    #sEnd {
      background: linear-gradient(160deg, #0d1b4b 0%, #1565c0 55%, #1976d2 100%);
      gap: clamp(10px, 2.5vh, 22px);
      overflow: hidden;
    }

    #fwCv {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    #endWrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(10px, 2.5vh, 20px);
    }

    #endPeng {
      font-size: clamp(70px, 18vw, 120px);
      animation: heroBob 1.5s ease-in-out infinite alternate;
    }

    #endTitle {
      font-size: clamp(1.9rem, 6.5vw, 3.4rem);
      color: #ffd600;
      text-align: center;
      font-weight: 900;
      text-shadow: 3px 4px 0 #e65100;
      animation: heroBob .9s ease-in-out infinite alternate;
    }

    .estat {
      font-size: clamp(1.25rem, 4.5vw, 2rem);
      color: #fff;
      text-align: center;
      font-weight: 700;
      line-height: 1.5;
    }

    .estat span {
      color: #ffd600;
      font-size: 1.18em;
    }

    .btn-yellow {
      background: #ffd600;
      color: #3e2723;
      border: none;
      border-radius: 60px;
      padding: clamp(14px, 2.5vh, 22px) clamp(40px, 9vw, 72px);
      font-family: inherit;
      font-weight: 900;
      font-size: clamp(1.3rem, 4vw, 2rem);
      cursor: pointer;
      box-shadow: 0 7px 0 #f57f17;
      transition: transform .1s, box-shadow .1s;
      letter-spacing: 1px;
    }

    .btn-yellow:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #f57f17;
    }
  </style>
</head>

<body>

  <!-- ════ START ════ -->
  <div id="sStart" class="screen">
    <div id="snowBg"></div>

    <div id="heroWrap">
      <div class="spotlight"></div>
      <div id="heroPeng">🐧</div>
    </div>

    <div id="titleWrap">
      <h1>Penguin Sled<br>Adventure! 🛷</h1>
    </div>

    <div class="sub-rules">
      <div class="rule-pill">⭐ Collect gold coins</div>
      <div class="rule-pill">❌ Avoid red X traps</div>
      <div class="rule-pill">❓ Answer 10 questions!</div>
    </div>

    <button id="btnStart">🎮 LET'S GO!</button>
  </div>

  <!-- ════ COUNTDOWN ════ -->
  <div id="cdOverlay" class="off">
    <div id="cdNum">3</div>
    <div id="cdLabel">Get Ready!</div>
  </div>

  <!-- ════ GAME ════ -->
  <div id="sGame" class="screen off">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div class="pill p-gold">⭐ <span class="v" id="vScore">0</span></div>
      <div class="pill p-time">⏱ <span class="v" id="vTimer">10</span></div>
      <div class="pill p-round">❓ <span class="v" id="vRound">1</span>/10</div>
    </div>
    <div id="steers">
      <div class="sbtn" id="btnL">◀</div>
      <div class="sbtn" id="btnR">▶</div>
    </div>
  </div>

  <!-- ════ QUESTION ════ -->
  <div id="sQuestion" class="screen off">
    <div id="qHead">Question <span id="qNum">1</span> of 10</div>
    <div id="qImg">🧸</div>
    <div id="qText">What is this toy?</div>
    <div id="qAnswers"></div>
    <div id="qFeed"></div>
    <div id="qBonus"></div>
  </div>

  <!-- ════ END ════ -->
  <div id="sEnd" class="screen off">
    <canvas id="fwCv"></canvas>
    <div id="endWrap">
      <div id="endPeng">🐧</div>
      <div id="endTitle">Great Job! 🎉</div>
      <div class="estat">Total Score: <span id="eFinalScore">0</span></div>
      <div class="estat">Correct Answers: <span id="eCorrect">0</span> / 10</div>
      <button class="btn-yellow" id="btnReplay">🔄 Play Again</button>
    </div>
  </div>

  <script>
    'use strict';

    // ════════════════════════════════════════════════
    //  AUDIO — Web Audio API, zero external files
    // ════════════════════════════════════════════════
    const AC = new (window.AudioContext || window.webkitAudioContext)();
    function resumeAC() { if (AC.state !== 'running') AC.resume(); }

    // Generic tone helper
    function tone(freq, type, dur, vol, delay = 0, detune = 0) {
      try {
        const o = AC.createOscillator(), g = AC.createGain();
        o.connect(g); g.connect(AC.destination);
        o.type = type; o.frequency.value = freq; o.detune.value = detune;
        const t = AC.currentTime + delay;
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.start(t); o.stop(t + dur + 0.02);
      } catch (e) { }
    }

    // SFX
    function sfxCoin() {
      tone(1046, 'sine', .07, .38);
      tone(1568, 'sine', .1, .28, .05);
    }
    function sfxBad() {
      tone(180, 'sawtooth', .25, .45);
      tone(140, 'sawtooth', .25, .38, .08);
    }
    function sfxCorrect() {
      [523, 659, 784, 1047].forEach((f, i) => tone(f, 'sine', .15, .32, i * .08));
    }
    function sfxWrong() {
      tone(220, 'square', .28, .4);
      tone(165, 'square', .32, .36, .1);
    }
    function sfxCountdown() {
      tone(660, 'sine', .18, .55);
    }
    function sfxGo() {
      [523, 659, 784, 1047, 1318].forEach((f, i) => tone(f, 'triangle', .18, .48, i * .06));
    }

    // ── BACKGROUND MUSIC ──
    let bgScheduleID = null;
    let bgNextTime = 0;
    let bgRunning = false;

    const BG_MELODY = [
      [523, .5], [659, .5], [784, .5], [880, .25], [784, .25],
      [659, .5], [523, .5], [659, 1],
      [784, .5], [880, .5], [1047, .5], [880, .5],
      [784, .5], [659, .5], [523, 1],
      [659, .5], [523, .25], [659, .25], [784, .5], [659, .5],
      [523, .5], [440, .5], [523, 1],
      [392, .5], [523, .5], [659, .5], [784, .5],
      [659, .5], [523, .5], [392, .5], [523, .5],
    ];
    const BG_BASS = [
      [130, .5], [165, .5], [196, .5], [165, .5],
      [130, .5], [146, .5], [130, 1],
      [174, .5], [196, .5], [220, .5], [196, .5],
      [174, .5], [165, .5], [130, 1],
      [146, .5], [130, .5], [146, .5], [130, .5],
      [123, .5], [130, .5], [123, 1],
      [110, .5], [130, .5], [146, .5], [165, .5],
      [146, .5], [130, .5], [110, .5], [130, .5],
    ];
    const BEAT_DUR = 0.22;

    let bgMelIdx = 0;
    let bgBassIdx = 0;

    function scheduleBG() {
      if (!bgRunning) return;
      const AHEAD = 2.0;
      const now = AC.currentTime;

      while (bgNextTime < now + AHEAD) {
        const [mf, md] = BG_MELODY[bgMelIdx % BG_MELODY.length];
        const dur = md * BEAT_DUR;
        try {
          const o = AC.createOscillator(), g = AC.createGain();
          o.connect(g); g.connect(AC.destination);
          o.type = 'triangle'; o.frequency.value = mf;
          g.gain.setValueAtTime(0.12, bgNextTime);
          g.gain.linearRampToValueAtTime(0.08, bgNextTime + dur * 0.7);
          g.gain.exponentialRampToValueAtTime(0.0001, bgNextTime + dur);
          o.start(bgNextTime); o.stop(bgNextTime + dur + 0.01);
        } catch (e) { }
        bgMelIdx++;

        if (bgMelIdx % 2 === 0) {
          const [bf, bd] = BG_BASS[bgBassIdx % BG_BASS.length];
          const bdur = bd * BEAT_DUR * 2;
          try {
            const o2 = AC.createOscillator(), g2 = AC.createGain();
            o2.connect(g2); g2.connect(AC.destination);
            o2.type = 'sine'; o2.frequency.value = bf;
            g2.gain.setValueAtTime(0.10, bgNextTime);
            g2.gain.exponentialRampToValueAtTime(0.0001, bgNextTime + bdur);
            o2.start(bgNextTime); o2.stop(bgNextTime + bdur + 0.01);
          } catch (e) { }
          bgBassIdx++;
        }

        if (bgMelIdx % 4 === 0) {
          try {
            const buf = AC.createBuffer(1, AC.sampleRate * 0.18, AC.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / 1800);
            const src = AC.createBufferSource(), gk = AC.createGain();
            src.buffer = buf; src.connect(gk); gk.connect(AC.destination);
            gk.gain.setValueAtTime(0.22, bgNextTime);
            gk.gain.exponentialRampToValueAtTime(0.0001, bgNextTime + 0.18);
            src.start(bgNextTime); src.stop(bgNextTime + 0.19);
          } catch (e) { }
        }

        bgNextTime += dur;
      }
      bgScheduleID = setTimeout(scheduleBG, 500);
    }

    function startBGMusic() {
      if (bgRunning) return;
      bgRunning = true;
      bgNextTime = AC.currentTime + 0.05;
      bgMelIdx = 0; bgBassIdx = 0;
      scheduleBG();
    }
    function stopBGMusic() {
      bgRunning = false;
      clearTimeout(bgScheduleID);
    }

    // ════════════════════════════════════════════════
    //  QUESTIONS
    // ════════════════════════════════════════════════
    const QUESTIONS = [
      { emoji: '🚛', q: 'This big toy has wheels and carries things!', correct: 'Toy Truck', opts: ['Toy Truck', 'Toy Car', 'Train'] },
      { emoji: '🧸', q: 'This is a soft toy you can hug!', correct: 'Stuffed Animal', opts: ['Stuffed Animal', 'Doll', 'Pillow'] },
      { emoji: '⭕', q: 'You spin this around your waist!', correct: 'Hula-Hoop', opts: ['Hula-Hoop', 'Ring', 'Circle'] },
      { emoji: '🛴', q: 'You stand on this and push to ride!', correct: 'Scooter', opts: ['Scooter', 'Bicycle', 'Skateboard'] },
      { emoji: '🤖', q: 'This toy looks like a machine person!', correct: 'Robot', opts: ['Robot', 'Monster', 'Alien'] },
      { emoji: '🦸', q: 'This toy looks like a hero from a movie!', correct: 'Action Figure', opts: ['Action Figure', 'Doll', 'Puppet'] },
      { emoji: '⛵', q: 'This toy floats and sails on water!', correct: 'Toy Boat', opts: ['Toy Boat', 'Toy Car', 'Kite'] },
      { emoji: '🟦', q: 'You stack and build things with these!', correct: 'Blocks', opts: ['Blocks', 'Bricks', 'Cards'] },
      { emoji: '🚗', q: 'This small toy has four wheels and drives!', correct: 'Toy Car', opts: ['Toy Car', 'Toy Truck', 'Bus'] },
      { emoji: '🧩', q: 'You fit the pieces together to make a picture!', correct: 'Puzzle', opts: ['Puzzle', 'Game', 'Cards'] },
    ];

    // ════════════════════════════════════════════════
    //  GAME STATE
    // ════════════════════════════════════════════════
    const G = {
      screen: 'start', totalScore: 0, roundScore: 0,
      questionIdx: 0, correctCount: 0,
      timer: 10, timerID: null, roundActive: false, questions: [],
    };

    // ════════════════════════════════════════════════
    //  SCREEN MANAGER
    // ════════════════════════════════════════════════
    const SCREENS = { start: 'sStart', game: 'sGame', question: 'sQuestion', end: 'sEnd' };
    function showScreen(name) {
      Object.values(SCREENS).forEach(id => document.getElementById(id).classList.add('off'));
      document.getElementById(SCREENS[name]).classList.remove('off');
      G.screen = name;
    }

    // ════════════════════════════════════════════════
    //  CANVAS & PERSPECTIVE GEOMETRY
    // ════════════════════════════════════════════════
    const cv = document.getElementById('gameCanvas');
    const ctx = cv.getContext('2d');
    let W = 0, H = 0, VPX = 0, VPY = 0, RHB = 0;

    function resize() {
      W = cv.width = window.innerWidth;
      H = cv.height = window.innerHeight;
      VPX = W * 0.5;
      VPY = H * 0.12;
      RHB = W * 0.80;
    }

    function rEdge(t, side) {
      const half = W * 0.038 + t * (RHB - W * 0.038);
      return VPX + side * half;
    }
    function lX(t, lane) {
      const half = W * 0.038 + t * (RHB - W * 0.038);
      return VPX + lane * half * 0.60;
    }
    function sY(t) { return VPY + t * (H - VPY); }

    // ════════════════════════════════════════════════
    //  OBJECTS
    // ════════════════════════════════════════════════
    let objects = [], particles = [], bgLines = [];
    let pengLane = 0, pengSmooth = 0;
    let steerL = false, steerR = false;
    let mouseActive = false, mouseTarget = 0;
    let animID = null, lastTS = 0;

    const OBJ_SPEED = 0.0090;

    function spawnObjects() {
      objects = [];
      const TOTAL = 22;
      const TRAPS = 5;

      const types = Array(TRAPS).fill('trap').concat(Array(TOTAL - TRAPS).fill('coin'));
      for (let i = types.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[types[i], types[j]] = [types[j], types[i]]; }

      const slots = [];
      for (let i = 0; i < TOTAL; i++) {
        const t = 0.06 + (i / TOTAL) * 0.86 + (Math.random() - .5) * 0.03;
        slots.push({ type: types[i], lane: 0, t, collected: false, bobPhase: Math.random() * Math.PI * 2 });
      }
      slots.sort((a, b) => a.t - b.t);

      const LANES = [-1, 0, 1];
      for (let i = 0; i < slots.length; i++) {
        const available = [...LANES];
        if (slots[i].type === 'trap') {
          const prev = slots.slice(Math.max(0, i - 2), i).filter(s => s.type === 'trap');
          if (prev.length >= 2 && prev[0].lane === prev[1].lane) {
            const blocked = prev[0].lane;
            const idx = available.indexOf(blocked);
            if (idx !== -1) available.splice(idx, 1);
          }
          const lastTrap = [...slots].slice(0, i).reverse().find(s => s.type === 'trap');
          if (lastTrap) {
            if (Math.random() < 0.7) {
              const idx2 = available.indexOf(lastTrap.lane);
              if (idx2 !== -1 && available.length > 1) available.splice(idx2, 1);
            }
          }
        }
        slots[i].lane = available[Math.floor(Math.random() * available.length)];
      }

      objects = slots;
    }

    function initBgLines() {
      bgLines = [];
      for (let i = 0; i < 16; i++) bgLines.push(makeLine(Math.random()));
    }
    function makeLine(prog = 0) {
      return { side: Math.random() < .5 ? -1 : 1, xOff: .55 + Math.random() * .45, prog, speed: .32 + Math.random() * .42 };
    }

    // ════════════════════════════════════════════════
    //  COUNTDOWN → GAME
    // ════════════════════════════════════════════════
    function runCountdown(cb) {
      const overlay = document.getElementById('cdOverlay');
      const numEl = document.getElementById('cdNum');
      const labEl = document.getElementById('cdLabel');
      overlay.classList.remove('off');
      let count = 3;

      function tick() {
        numEl.style.animation = 'none'; void numEl.offsetWidth; numEl.style.animation = 'cdPop .5s cubic-bezier(.34,1.56,.64,1)';
        if (count > 0) {
          numEl.textContent = count;
          labEl.textContent = count === 3 ? 'Get Ready!' : count === 2 ? 'Steady...' : 'Almost!';
          sfxCountdown();
          count--;
          setTimeout(tick, 900);
        } else {
          numEl.textContent = 'GO! 🚀';
          labEl.textContent = 'Collect the stars!';
          sfxGo();
          setTimeout(() => { overlay.classList.add('off'); cb(); }, 700);
        }
      }
      tick();
    }

    // ════════════════════════════════════════════════
    //  ROUND INIT
    // ════════════════════════════════════════════════
    function initRound() {
      resize();
      pengLane = 0; pengSmooth = 0; steerL = steerR = false;
      particles = []; G.roundScore = 0; G.roundActive = true; G.timer = 12;

      document.getElementById('vScore').textContent = Math.max(0, G.totalScore);
      document.getElementById('vTimer').textContent = '12';
      document.getElementById('vRound').textContent = G.questionIdx + 1;

      initBgLines(); spawnObjects();
      clearInterval(G.timerID);
      G.timerID = setInterval(tickTimer, 1000);
      if (animID) cancelAnimationFrame(animID);
      lastTS = 0; animID = requestAnimationFrame(loop);
      startBGMusic();
    }

    function tickTimer() {
      if (!G.roundActive) return;
      G.timer--;
      const el = document.getElementById('vTimer');
      el.textContent = G.timer;
      if (G.timer <= 3) { el.parentElement.style.background = '#ffcdd2'; el.parentElement.style.borderColor = '#e53935'; }
      if (G.timer <= 0) {
        G.roundActive = false; clearInterval(G.timerID);
        cancelAnimationFrame(animID); animID = null;
        stopBGMusic();
        setTimeout(showQuestion, 200);
      }
    }

    // ════════════════════════════════════════════════
    //  GAME LOOP
    // ════════════════════════════════════════════════
    function loop(ts) {
      if (!G.roundActive) return;
      const dt = lastTS ? Math.min((ts - lastTS) / 16.667, 3) : 1;
      lastTS = ts; update(dt); draw();
      animID = requestAnimationFrame(loop);
    }

    function update(dt) {
      // Keyboard/touch button steering (acceleration-based)
      const acc = 0.018 * dt * 5;
      if (steerL) pengLane = Math.max(-1, pengLane - acc);
      if (steerR) pengLane = Math.min(1, pengLane + acc);

      // Mouse steering (direct position targeting)
      if (mouseActive && !steerL && !steerR) {
        pengLane += (mouseTarget - pengLane) * Math.min(1, 0.08 * dt);
      }

      // Frame-independent exponential smoothing (eliminates jitter)
      const smoothFactor = 1 - Math.pow(0.00008, dt / 60);
      pengSmooth += (pengLane - pengSmooth) * smoothFactor;

      const speed = OBJ_SPEED * dt;
      objects.forEach(o => {
        if (o.collected) return;
        o.t += speed;
        if (o.t > 1.14) { o.t = 0.055 + Math.random() * 0.06; o.lane = [-1, 0, 1][Math.floor(Math.random() * 3)]; }

        if (o.t > 0.76) {
          const ox = lX(o.t, o.lane), oy = sY(o.t);
          const px = lX(0.92, pengSmooth), py = sY(0.92);
          const hitR = 20 + o.t * 30;
          const dx = ox - px, dy = oy - py;
          if (dx * dx + dy * dy < (hitR + 40) * (hitR + 40)) {
            o.collected = true;
            if (o.type === 'coin') {
              G.totalScore += 10; G.roundScore += 10; sfxCoin();
              burst(ox, oy, '✨', 10);
            } else {
              G.totalScore = Math.max(0, G.totalScore - 5); sfxBad();
              burst(ox, oy, '💥', 9);
            }
            document.getElementById('vScore').textContent = Math.max(0, G.totalScore);
          }
        }
      });

      particles = particles.filter(p => p.life > 0.01);
      particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.2 * dt; p.life -= 0.028 * dt; });
      bgLines.forEach(l => { l.prog += l.speed * 0.017 * dt; if (l.prog > 1) Object.assign(l, makeLine(0)); });
    }

    function burst(x, y, em, n) {
      for (let i = 0; i < n; i++) {
        const a = (Math.PI * 2 / n) * i + Math.random() * .4, s = 2.5 + Math.random() * 4;
        particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1.8, life: 1, em, size: 13 + Math.random() * 10 });
      }
    }

    // ════════════════════════════════════════════════
    //  DRAW
    // ════════════════════════════════════════════════
    function draw() {
      ctx.clearRect(0, 0, W, H);

      const sg = ctx.createLinearGradient(0, 0, 0, VPY * 2.2);
      sg.addColorStop(0, '#0d47a1'); sg.addColorStop(.5, '#1976d2'); sg.addColorStop(1, '#b3e5fc');
      ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);

      drawMountains();

      const gg = ctx.createLinearGradient(0, VPY, 0, H);
      gg.addColorStop(0, '#e0f7fa'); gg.addColorStop(.35, '#b2ebf2'); gg.addColorStop(1, '#80deea');
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.moveTo(0, VPY); ctx.lineTo(W, VPY); ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();

      ctx.beginPath();
      ctx.moveTo(rEdge(0, -1), sY(0)); ctx.lineTo(rEdge(0, 1), sY(0));
      ctx.lineTo(rEdge(1, 1), sY(1)); ctx.lineTo(rEdge(1, -1), sY(1));
      ctx.closePath();
      const rg = ctx.createLinearGradient(0, VPY, 0, H);
      rg.addColorStop(0, 'rgba(185,228,245,.90)'); rg.addColorStop(.5, 'rgba(205,238,252,.95)'); rg.addColorStop(1, 'rgba(225,248,255,1)');
      ctx.fillStyle = rg; ctx.fill();

      [-1, 1].forEach(s => {
        ctx.beginPath(); ctx.moveTo(rEdge(0, s), sY(0)); ctx.lineTo(rEdge(1, s), sY(1));
        ctx.strokeStyle = 'rgba(255,255,255,.72)'; ctx.lineWidth = 3.5; ctx.stroke();
      });

      drawLaneDashes();
      drawSpeedLines();
      drawObjects();
      drawParticles();
      drawPenguin();
    }

    function drawMountains() {
      [[.08, .22, .73], [.28, .21, .62], [.50, .26, .68], [.72, .22, .60], [.92, .20, .74]].forEach(([cx, w, ht]) => {
        ctx.beginPath();
        ctx.moveTo((cx - w) * W, VPY * 1.04); ctx.lineTo(cx * W, ht * VPY); ctx.lineTo((cx + w) * W, VPY * 1.04);
        ctx.closePath(); ctx.fillStyle = 'rgba(144,202,249,.30)'; ctx.fill();
        ctx.beginPath();
        ctx.moveTo((cx - w * .3) * W, ht * VPY + (1 - ht) * VPY * 1.8); ctx.lineTo(cx * W, ht * VPY); ctx.lineTo((cx + w * .3) * W, ht * VPY + (1 - ht) * VPY * 1.8);
        ctx.closePath(); ctx.fillStyle = 'rgba(255,255,255,.82)'; ctx.fill();
      });
    }

    function drawLaneDashes() {
      for (let i = 0; i < 18; i++) {
        if (i % 2 === 0) continue;
        const t0 = i / 18, t1 = (i + .48) / 18;
        ctx.beginPath(); ctx.moveTo(lX(t0, 0), sY(t0)); ctx.lineTo(lX(t1, 0), sY(t1));
        ctx.strokeStyle = `rgba(255,255,255,${.1 + t0 * .45})`; ctx.lineWidth = 1.5 + t0 * 4.5; ctx.stroke();
      }
    }

    function drawSpeedLines() {
      bgLines.forEach(l => {
        const t0 = l.prog * .7, t1 = Math.min(l.prog, .97);
        if (t1 <= t0 + .01) return;
        const bx = rEdge(0, l.side) + l.side * l.xOff * W * .16;
        ctx.beginPath();
        ctx.moveTo(bx + l.side * t0 * W * .10, VPY + t0 * (H - VPY));
        ctx.lineTo(bx + l.side * t1 * W * .10, VPY + t1 * (H - VPY));
        ctx.strokeStyle = `rgba(255,255,255,${(1 - l.prog) * .18})`; ctx.lineWidth = 1.5; ctx.stroke();
      });
    }

    function drawObjects() {
      const now = performance.now() * .001;
      objects.forEach(o => {
        if (o.collected) return;
        const r = 10 + o.t * 30;
        const cx = lX(o.t, o.lane);
        const cy = sY(o.t) + Math.sin(now * 2.4 + o.bobPhase) * (2 + o.t * 5);
        const al = Math.min(1, .2 + o.t * .9);

        if (o.type === 'coin') {
          const gl = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.5);
          gl.addColorStop(0, `rgba(255,215,0,${al * .42})`); gl.addColorStop(1, 'rgba(255,215,0,0)');
          ctx.beginPath(); ctx.arc(cx, cy, r * 2.5, 0, Math.PI * 2); ctx.fillStyle = gl; ctx.fill();
          const cg = ctx.createRadialGradient(cx - r * .3, cy - r * .3, r * .1, cx, cy, r);
          cg.addColorStop(0, `rgba(255,248,100,${al})`); cg.addColorStop(.6, `rgba(255,193,7,${al})`); cg.addColorStop(1, `rgba(230,140,0,${al})`);
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fillStyle = cg; ctx.fill();
          ctx.strokeStyle = `rgba(180,110,0,${al})`; ctx.lineWidth = Math.max(1.5, r * .13); ctx.stroke();
          ctx.fillStyle = `rgba(120,70,0,${al})`; ctx.font = `bold ${Math.max(9, r)}px serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('★', cx, cy);
        } else {
          const gl = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.4);
          gl.addColorStop(0, `rgba(244,67,54,${al * .45})`); gl.addColorStop(1, 'rgba(244,67,54,0)');
          ctx.beginPath(); ctx.arc(cx, cy, r * 2.4, 0, Math.PI * 2); ctx.fillStyle = gl; ctx.fill();
          const tg = ctx.createRadialGradient(cx - r * .28, cy - r * .28, r * .1, cx, cy, r);
          tg.addColorStop(0, `rgba(255,100,90,${al})`); tg.addColorStop(.6, `rgba(244,67,54,${al})`); tg.addColorStop(1, `rgba(183,28,28,${al})`);
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fillStyle = tg; ctx.fill();
          ctx.strokeStyle = `rgba(130,0,0,${al})`; ctx.lineWidth = Math.max(1.5, r * .13); ctx.stroke();
          const xs = r * .55;
          ctx.strokeStyle = `rgba(255,255,255,${al})`; ctx.lineWidth = Math.max(2, r * .22); ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(cx - xs, cy - xs); ctx.lineTo(cx + xs, cy + xs); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(cx + xs, cy - xs); ctx.lineTo(cx - xs, cy + xs); ctx.stroke();
          ctx.lineCap = 'butt';
        }
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.font = `${p.size}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(p.em, p.x, p.y);
      });
      ctx.globalAlpha = 1;
    }

    function drawPenguin() {
      const t = 0.92;
      const cx = lX(t, pengSmooth), cy = sY(t);
      const lean = pengSmooth * .22;
      const S = Math.min(W, H) * .13;

      ctx.save(); ctx.translate(cx, cy); ctx.rotate(lean);

      // Sled
      ctx.save(); ctx.translate(0, S * .56);
      const bW = S * 1.6, bH = S * .22, bR = S * .08;
      ctx.beginPath();
      ctx.moveTo(-bW / 2 + bR, -bH / 2); ctx.lineTo(bW / 2 - bR, -bH / 2);
      ctx.arcTo(bW / 2, -bH / 2, bW / 2, 0, bR); ctx.lineTo(bW / 2, bH / 2 - bR);
      ctx.arcTo(bW / 2, bH / 2, -bW / 2, bH / 2, bR); ctx.lineTo(-bW / 2 + bR, bH / 2);
      ctx.arcTo(-bW / 2, bH / 2, -bW / 2, -bH / 2, bR); ctx.lineTo(-bW / 2, -bH / 2 + bR);
      ctx.arcTo(-bW / 2, -bH / 2, -bW / 2 + bR, -bH / 2, bR);
      ctx.closePath(); ctx.fillStyle = '#6d4c41'; ctx.fill();
      ctx.strokeStyle = '#4e342e'; ctx.lineWidth = S * .055; ctx.stroke();
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath(); ctx.moveTo(i * S * .4, -bH / 2 + 2); ctx.lineTo(i * S * .4, bH / 2 - 2);
        ctx.strokeStyle = 'rgba(78,52,46,.38)'; ctx.lineWidth = 1.5; ctx.stroke();
      }
      [-.56, .56].forEach(rx => {
        ctx.beginPath(); ctx.moveTo(rx * S - S * .26, S * .15); ctx.lineTo(rx * S + S * .26, S * .15);
        ctx.strokeStyle = '#90a4ae'; ctx.lineWidth = S * .10; ctx.lineCap = 'round'; ctx.stroke(); ctx.lineCap = 'butt';
      });
      ctx.restore();

      // Body
      ctx.beginPath(); ctx.ellipse(0, S * .06, S * .50, S * .57, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#1a237e'; ctx.fill();
      ctx.beginPath(); ctx.ellipse(0, S * .02, S * .28, S * .36, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(63,81,181,.4)'; ctx.fill();

      // Wings
      const flap = Math.sin(performance.now() * .004) * .13;
      [-1, 1].forEach(s => {
        ctx.save(); ctx.translate(s * S * .49, -S * .04); ctx.rotate(s * (.42 + flap));
        ctx.beginPath(); ctx.ellipse(0, 0, S * .17, S * .43, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#283593'; ctx.fill(); ctx.restore();
      });

      // Head
      ctx.beginPath(); ctx.arc(0, -S * .45, S * .31, 0, Math.PI * 2);
      ctx.fillStyle = '#1a237e'; ctx.fill();
      ctx.beginPath(); ctx.arc(-S * .07, -S * .52, S * .13, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(121,134,203,.34)'; ctx.fill();

      // Scarf
      ctx.save(); ctx.translate(0, -S * .24);
      ctx.beginPath(); ctx.ellipse(0, 0, S * .43, S * .11, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#f44336'; ctx.fill();
      ctx.beginPath(); ctx.ellipse(0, 0, S * .43, S * .038, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#fff176'; ctx.fill();
      const wave = Math.sin(performance.now() * .003) * S * .12;
      ctx.beginPath(); ctx.moveTo(S * .28, 0);
      ctx.quadraticCurveTo(S * .52 + wave, S * .22, S * .40, S * .50);
      ctx.strokeStyle = '#f44336'; ctx.lineWidth = S * .13; ctx.lineCap = 'round'; ctx.stroke(); ctx.lineCap = 'butt';
      ctx.restore();

      // Hat
      ctx.save(); ctx.translate(0, -S * .74);
      ctx.beginPath(); ctx.ellipse(0, 0, S * .37, S * .10, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#b71c1c'; ctx.fill();
      const hw = S * .23, hh = S * .40, hr = S * .07;
      ctx.beginPath();
      ctx.moveTo(-hw + hr, -hh); ctx.lineTo(hw - hr, -hh);
      ctx.arcTo(hw, -hh, hw, -hh + hr, hr); ctx.lineTo(hw, -hr);
      ctx.arcTo(hw, 0, hw - hr, 0, hr); ctx.lineTo(-hw + hr, 0);
      ctx.arcTo(-hw, 0, -hw, -hh + hr, hr); ctx.lineTo(-hw, -hh + hr);
      ctx.arcTo(-hw, -hh, -hw + hr, -hh, hr); ctx.closePath();
      ctx.fillStyle = '#c62828'; ctx.fill();
      ctx.beginPath(); ctx.arc(0, -hh, S * .10, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
      ctx.restore();

      ctx.restore();
    }

    // ════════════════════════════════════════════════
    //  QUESTION SCREEN
    // ════════════════════════════════════════════════
    function showQuestion() {
      showScreen('question');
      const q = G.questions[G.questionIdx];
      document.getElementById('qNum').textContent = G.questionIdx + 1;
      document.getElementById('qImg').textContent = q.emoji;
      document.getElementById('qText').textContent = q.q;
      document.getElementById('qFeed').textContent = '';
      document.getElementById('qBonus').textContent = `You collected ⭐ ${G.roundScore} coins this round!`;

      const tp = document.querySelector('.p-time');
      tp.style.background = ''; tp.style.borderColor = '';

      const imgEl = document.getElementById('qImg');
      imgEl.style.animation = 'none'; void imgEl.offsetWidth; imgEl.style.animation = '';

      const row = document.getElementById('qAnswers');
      row.innerHTML = '';
      [...q.opts].sort(() => Math.random() - .5).forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'abtn'; btn.textContent = opt;
        btn.addEventListener('click', () => handleAnswer(opt, q, btn, row));
        row.appendChild(btn);
      });
    }

    function handleAnswer(chosen, q, btn, row) {
      resumeAC();
      row.querySelectorAll('.abtn').forEach(b => { b.onclick = null; b.disabled = true; });
      const feed = document.getElementById('qFeed');
      if (chosen === q.correct) {
        btn.classList.add('ok'); feed.textContent = '✅ Awesome! Correct!';
        G.totalScore += 20; G.correctCount++; sfxCorrect();
      } else {
        btn.classList.add('no'); feed.textContent = `❌ Right answer: ${q.correct}`;
        row.querySelectorAll('.abtn').forEach(b => { if (b.textContent === q.correct) b.classList.add('ok'); });
        sfxWrong();
      }
      document.getElementById('vScore').textContent = Math.max(0, G.totalScore);
      setTimeout(() => {
        G.questionIdx++;
        if (G.questionIdx >= 10) showEndScreen();
        else {
          showScreen('game');
          if (G.questionIdx === 0) runCountdown(initRound);
          else initRound();
        }
      }, 2200);
    }

    // ════════════════════════════════════════════════
    //  FIREWORKS
    // ════════════════════════════════════════════════
    const fwCv = document.getElementById('fwCv'), fwCtx = fwCv.getContext('2d');
    let fwParts = [], fwIntID = null, fwRafID = null, fwOn = false;

    function startFW() {
      fwCv.width = window.innerWidth; fwCv.height = window.innerHeight;
      fwParts = []; fwOn = true; clearInterval(fwIntID);
      fwIntID = setInterval(launchFW, 640); fwLoop();
    }
    function stopFW() {
      fwOn = false; clearInterval(fwIntID); if (fwRafID) cancelAnimationFrame(fwRafID);
    }
    function launchFW() {
      const fw = fwCv.width, fh = fwCv.height;
      const x = 60 + Math.random() * (fw - 120), y = 55 + Math.random() * (fh * .52);
      const cols = ['#ffd600', '#f44336', '#4caf50', '#2196f3', '#e040fb', '#ff9800', '#00bcd4', '#ec407a'];
      const col = cols[Math.floor(Math.random() * cols.length)];
      const n = 32 + Math.floor(Math.random() * 22);
      for (let i = 0; i < n; i++) {
        const a = (Math.PI * 2 / n) * i, s = 4 + Math.random() * 7;
        fwParts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - .5, col, life: 1, size: 2.5 + Math.random() * 3.5 });
      }
      tone(300 + Math.random() * 500, 'square', .18, .13);
      tone(400 + Math.random() * 400, 'triangle', .22, .11, .08);
    }
    function fwLoop() {
      if (!fwOn) return;
      fwCtx.fillStyle = 'rgba(13,27,75,.17)'; fwCtx.fillRect(0, 0, fwCv.width, fwCv.height);
      fwParts = fwParts.filter(p => p.life > 0.01);
      fwParts.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += .12; p.vx *= .985; p.life -= .016;
        fwCtx.globalAlpha = Math.max(0, p.life);
        fwCtx.beginPath(); fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        fwCtx.fillStyle = p.col; fwCtx.fill();
      });
      fwCtx.globalAlpha = 1;
      fwRafID = requestAnimationFrame(fwLoop);
    }

    // ════════════════════════════════════════════════
    //  END SCREEN
    // ════════════════════════════════════════════════
    function showEndScreen() {
      if (animID) { cancelAnimationFrame(animID); animID = null; }
      clearInterval(G.timerID); G.roundActive = false; stopBGMusic();
      showScreen('end');
      document.getElementById('eFinalScore').textContent = Math.max(0, G.totalScore);
      document.getElementById('eCorrect').textContent = G.correctCount;
      const titles = ['Keep Trying! 💪', 'Good Start! 🌱', 'Nice Work! 🌟', 'Great Job! ⭐', 'Awesome! 🏅',
        'Superstar! 🥇', 'Champion! 🏆', 'Amazing! 💎', 'Outstanding! 🚀', 'Perfect! 👑', 'Penguin Master! 🐧'];
      document.getElementById('endTitle').textContent = titles[G.correctCount] || '🎉 Well Done!';
      startFW();
    }

    // ════════════════════════════════════════════════
    //  INPUT
    // ════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
      resumeAC();
      if (e.key === 'ArrowLeft') { steerL = true; e.preventDefault(); }
      if (e.key === 'ArrowRight') { steerR = true; e.preventDefault(); }
    });
    document.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft') steerL = false;
      if (e.key === 'ArrowRight') steerR = false;
    });

    const btnL = document.getElementById('btnL'), btnR = document.getElementById('btnR');
    ['pointerdown', 'touchstart'].forEach(ev => {
      btnL.addEventListener(ev, e => { e.preventDefault(); resumeAC(); steerL = true; }, { passive: false });
      btnR.addEventListener(ev, e => { e.preventDefault(); resumeAC(); steerR = true; }, { passive: false });
    });
    ['pointerup', 'pointercancel', 'touchend', 'touchcancel'].forEach(ev => {
      btnL.addEventListener(ev, () => steerL = false);
      btnR.addEventListener(ev, () => steerR = false);
    });

    cv.addEventListener('touchstart', e => {
      resumeAC();
      const x = e.touches[0].clientX;
      steerL = x < W / 2; steerR = x >= W / 2;
    }, { passive: true });
    cv.addEventListener('touchend', () => { steerL = false; steerR = false; });
    cv.addEventListener('touchcancel', () => { steerL = false; steerR = false; });

    cv.addEventListener('mousemove', e => {
      if (G.screen !== 'game') return;
      mouseActive = true;
      // Map mouse X to lane position (-1 to 1) with a dead zone in center
      const nx = (e.clientX / W) - 0.5;
      if (Math.abs(nx) < 0.08) {
        mouseTarget = pengLane; // dead zone: hold current position
      } else {
        mouseTarget = Math.max(-1, Math.min(1, nx * 2.2));
      }
    });
    cv.addEventListener('mouseleave', () => { mouseActive = false; });

    // ════════════════════════════════════════════════
    //  SNOWFLAKES on start screen
    // ════════════════════════════════════════════════
    function makeSnow() {
      const cont = document.getElementById('snowBg');
      const chars = ['❄', '❅', '❆', '*', '·', '•'];
      for (let i = 0; i < 28; i++) {
        const el = document.createElement('div');
        el.className = 'sf'; el.textContent = chars[Math.floor(Math.random() * chars.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (.7 + Math.random() * 1.4) + 'rem';
        el.style.animationDuration = (5 + Math.random() * 8) + 's';
        el.style.animationDelay = (-Math.random() * 10) + 's';
        cont.appendChild(el);
      }
    }

    // ════════════════════════════════════════════════
    //  BOOT
    // ════════════════════════════════════════════════
    document.getElementById('btnStart').addEventListener('click', () => {
      resumeAC();
      G.questions = [...QUESTIONS].sort(() => Math.random() - .5);
      G.totalScore = 0; G.questionIdx = 0; G.correctCount = 0;
      showScreen('game');
      runCountdown(initRound);
    });

    document.getElementById('btnReplay').addEventListener('click', () => {
      resumeAC(); stopFW(); fwCtx.clearRect(0, 0, fwCv.width, fwCv.height);
      showScreen('start');
    });

    window.addEventListener('resize', () => {
      if (G.screen === 'game') resize();
      if (G.screen === 'end') { fwCv.width = window.innerWidth; fwCv.height = window.innerHeight; }
    });

    resize();
    makeSnow();
  </script>
</body>

</html>
